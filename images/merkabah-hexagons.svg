<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 220" width="230" height="220">
  <!-- Two flat-top hexagons on top sharing a vertical edge -->
  <polygon points="50,10 90,10 110,60 90,110 50,110 30,60" fill="none" stroke="black" stroke-width="2"/>
  <polygon points="130,10 170,10 190,60 170,110 130,110 110,60" fill="none" stroke="black" stroke-width="2"/>
  <!-- One hexagon centered below, sharing edges with both top hexagons -->
  <polygon points="90,110 130,110 150,160 130,210 90,210 70,160" fill="none" stroke="black" stroke-width="2"/>
</svg>
